name: Release

# push master 自动发版：读取 package.json 版本 → 构建 Windows web_api.exe + Forge make
# → 上传到 v{version} tag 的 GitHub Release；同一版本多次 push 用 --clobber 覆盖 assets
# 后端为 onnxruntime-directml + comtypes，实质 Windows-only，因此仅构建 Windows 产物

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "python/**"
      - "assets/**"
      - "forge.config.ts"
      - "vite.base.config.ts"
      - "vite.main.config.ts"
      - "vite.preload.config.ts"
      - "vite.renderer.config.mts"
      - "vite.renderer.config.ts"
      - "tsconfig.json"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/release.yml"
      - ".github/actions/**"
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "Failed to resolve package.json version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION, tag: v$VERSION"

  build-windows:
    needs: version
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        # 不在此处 lfs: true；ONNX 模型由 build-python-win 的 cache 负责还原，避免每次消耗 LFS 带宽

      - name: Setup Node App
        uses: ./.github/actions/setup-node-app

      - name: Build Python backend (web_api.exe via Nuitka)
        uses: ./.github/actions/build-python-win

      - name: Verify web_api.exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "python/out/web_api.exe")) {
            throw "python/out/web_api.exe not found, Nuitka build failed"
          }
          $sizeMB = [math]::Round((Get-Item python/out/web_api.exe).Length / 1MB, 1)
          Write-Host "web_api.exe size: $sizeMB MB"

      # --platform=win32 让 forge 跳过 forge.config.ts 里的 darwin / rpm / deb makers
      - name: Package with Electron Forge (Windows)
        shell: pwsh
        run: npm run make -- --platform=win32

      - name: Collect release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $Assets = "release-assets"
          New-Item -ItemType Directory -Force -Path $Assets | Out-Null

          # Squirrel Windows: Setup.exe（用户安装入口）
          $squirrelDir = "out/make/squirrel.windows/x64"
          if (Test-Path $squirrelDir) {
            Get-ChildItem -Path $squirrelDir -Filter "*.exe" |
              Copy-Item -Destination $Assets -Force
          } else {
            Write-Host "[warn] Squirrel output not found at $squirrelDir"
          }

          # WiX MSI：msi 安装包
          $wixDir = "out/make/wix/x64"
          if (Test-Path $wixDir) {
            Get-ChildItem -Path $wixDir -Filter "*.msi" |
              Copy-Item -Destination $Assets -Force
          } else {
            Write-Host "[warn] WiX output not found at $wixDir"
          }

          Write-Host "==== Collected assets ===="
          Get-ChildItem $Assets | Format-Table Name, @{N='MB';E={[math]::Round($_.Length/1MB,2)}}

      - name: Generate SHA256 checksums
        shell: pwsh
        run: |
          $Assets = "release-assets"
          $checksums = Join-Path $Assets "checksums.txt"
          Set-Content -Path $checksums -Value ""
          Get-ChildItem $Assets -File | Where-Object { $_.Name -ne "checksums.txt" } | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)" | Add-Content -Path $checksums
          }
          Write-Host "==== checksums.txt ===="
          Get-Content $checksums

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          if-no-files-found: error
          retention-days: 7
          path: release-assets/

  release:
    needs: [version, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-windows
          path: release-assets

      # 从上一个版本 tag 到 HEAD 的 commit 按版本 bump 分节展示
      - name: Generate release notes from commit log
        env:
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          # 查找上一个版本 tag（仅匹配 x.y.z 格式，排除 backup/Alpha 等非版本 tag）
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -E "^(v)?[0-9]+\.[0-9]+\.[0-9]+$" \
            | grep -vE "^(v)?${VERSION}$" \
            | head -1)

          {
            echo "## 更新内容"
            echo ""

            if [ -z "$PREV_TAG" ]; then
              echo "（首次发布）"
              git log --format="%h %s" --reverse | head -50
            else
              # 查找版本 bump commit：首个在 package.json diff 中引入当前版本号的 commit
              # -S 搜索 diff 中新增了 "version": "X.Y.Z" 字符串的 commit
              BUMPCOMMIT=$(git log "${PREV_TAG}..HEAD" --reverse --format="%H" \
                -S "\"version\": \"${VERSION}\"" -- package.json | head -1)

              if [ -n "$BUMPCOMMIT" ]; then
                # 有版本 bump：分两节，避免上个版本期间积累的 commit 与本版本新增混在一起
                # 第二节：bump 之后的 commit（当前版本的新增变更）
                POST_BUMP=$(git log "${BUMPCOMMIT}..HEAD" --format="%h %s" --reverse)
                if [ -n "$POST_BUMP" ]; then
                  echo "### v${VERSION} 新增"
                  echo ""
                  echo "$POST_BUMP"
                  echo ""
                fi

                # 第一节：bump commit 及之前积累的 commit（上个版本期间未发版的变更）
                ACCUMULATED=$(git log "${PREV_TAG}..${BUMPCOMMIT}" --format="%h %s" --reverse)
                if [ -n "$ACCUMULATED" ]; then
                  echo "### 自 \`${PREV_TAG}\` 积累"
                  echo ""
                  echo "$ACCUMULATED"
                  echo ""
                fi
              else
                # 无版本 bump（同版本重新 push）：单节展示全部增量
                echo "自 \`${PREV_TAG}\` 以来的变更："
                echo ""
                git log "${PREV_TAG}..HEAD" --format="%h %s" --reverse
                echo ""
              fi
            fi

            echo "---"
            echo "自动构建 from ${{ github.sha }}"
          } > release-notes.md
          echo "==== release-notes.md ===="
          cat release-notes.md

      # 同一版本多次 push：tag 已存在则更新 notes + assets（--clobber 覆盖）
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; updating notes and assets."
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi

          cd release-assets
          for file in *; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done
