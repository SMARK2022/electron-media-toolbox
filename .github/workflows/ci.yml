name: CI

# ============================================================================
# 多平台流水线：质量门禁 + 构建 + E2E + 发版
# ============================================================================
#
# 依赖链：
#   push/PR to master
#     ├── quality          (lint + tsc + format + vitest)     ← 三平台矩阵并行
#     ├── build-windows    (Nuitka onefile + make)            ← 并行
#     ├── build-macos      (Nuitka app bundle + make)         ← 并行
#     │
#     ├── e2e-windows      needs: [quality, build-windows]
#     ├── e2e-macos        needs: [quality, build-macos]
#     │
#     └── release          needs: [e2e-windows, e2e-macos]    ← 单 job，ubuntu runner
#
# 设计要点：
# - quality 和两个 build 并行执行，互不阻塞
# - 每个平台的 e2e 门控于 quality + 对应 build
# - release 等待两个 e2e 都通过后执行：下载两个平台的 release assets，一次性发布
# - build job 同时产出 packaged app（给 E2E）和安装包（给 release），release 零重复编译
# - PR 只跑 quality + build + e2e，跳过 release（release 仅 push to master 触发）
# - build 的 Nuitka 编译有 cache（build-python-win / build-python-mac action）

on:
  push:
    branches: [master]
    # 仅源码/配置/依赖变更才触发完整流水线（含构建+E2E+发版），
    # 避免纯文档/README 改动触发 ~30min 的 Nuitka+Forge 构建
    paths:
      - "src/**"
      - "python/**"
      - "assets/**"
      - "forge.config.ts"
      - "vite.base.config.ts"
      - "vite.main.config.ts"
      - "vite.preload.config.ts"
      - "vite.renderer.config.mts"
      - "vite.renderer.config.ts"
      - "tsconfig.json"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
      - ".github/actions/**"
      - "scripts/**"
  pull_request:
    branches: [master]
    paths:
      - "src/**"
      - "python/**"
      - "assets/**"
      - "forge.config.ts"
      - "package.json"
      - ".github/workflows/ci.yml"
      - ".github/actions/**"
  workflow_dispatch:

# 不使用 cancel-in-progress：release job 正在上传 assets 时被取消
# 会留下半创建的 Release + 部分上传的 asset
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # release job 需要创建 tag 和 GitHub Release

jobs:
  # ==========================================================================
  # Job 1: 质量门禁（lint + typecheck + format + vitest）
  # 三平台矩阵（ubuntu + windows + macos），与其他 build job 并行
  # ==========================================================================
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-2022
          - os: macos
            runner: macos-14
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # 单元测试基于 jsdom，不触达 better-sqlite3 native 绑定，跳过 rebuild 加速
      - name: Setup Node App
        uses: ./.github/actions/setup-node-app
        with:
          rebuild-native: "false"

      - name: Lint (eslint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Format check (prettier)
        run: npm run format

      - name: Unit tests (vitest, jsdom)
        run: npm run test

  # ==========================================================================
  # Job 2a: Windows 构建（Nuitka onefile + Forge make）
  # 产出：packaged app（给 E2E）+ Squirrel .exe / WiX .msi（给 release）
  # ==========================================================================
  build-windows:
    name: Build (Windows)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        # 不在此处 lfs: true；ONNX 模型由 build-python-win 的 cache 负责还原

      - name: Setup Node App
        uses: ./.github/actions/setup-node-app

      - name: Build Python backend (web_api.exe via Nuitka)
        uses: ./.github/actions/build-python-win

      - name: Verify web_api.exe exists
        shell: pwsh
        run: |
          if (-not (Test-Path "python/out/web_api.exe")) {
            throw "python/out/web_api.exe not found, Nuitka build failed"
          }
          $sizeMB = [math]::Round((Get-Item python/out/web_api.exe).Length / 1MB, 1)
          Write-Host "web_api.exe size: $sizeMB MB"

      # make 同时产出 packaged app（out/Electron Media Toolbox-win32-x64/）
      # 和安装包（out/make/squirrel.windows/ + out/make/wix/）
      # --platform=win32 让 forge 跳过 darwin/rpm/deb makers
      # NODE_OPTIONS 防止 Forge 7 异步打包的 unhandled rejection 终止进程
      - name: Build installers with Electron Forge (Windows)
        shell: bash
        env:
          NODE_OPTIONS: "--unhandled-rejections=warn"
        run: npm run make -- --platform=win32

      # 验证打包产物确实存在
      - name: Verify packaged app exists
        shell: pwsh
        run: |
          Write-Host "Contents of out/:"
          Get-ChildItem -Path "out" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Write-Host "  $($_.Name)" }
          $buildDir = Get-ChildItem -Path "out" -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "win32-x64" } | Select-Object -First 1
          if (-not $buildDir) {
            throw "Packaged app not found in out/ (expected out/Electron Media Toolbox-win32-x64/)"
          }
          Write-Host "Packaged app: $($buildDir.FullName)"

      # 上传打包产物供 e2e-windows job 下载使用
      - name: Upload packaged app (for E2E)
        uses: actions/upload-artifact@v4
        with:
          name: packaged-app-win
          path: out/Electron Media Toolbox-win32-x64/
          if-no-files-found: error
          retention-days: 1

      # 上传安装包供 release job 下载使用（Squirrel .exe + WiX .msi）
      - name: Upload release assets (for release)
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-win
          path: out/make/
          if-no-files-found: error
          retention-days: 7

  # ==========================================================================
  # Job 2b: macOS 构建（Nuitka app bundle + Forge make）
  # 产出：packaged app（给 E2E）+ ZIP（给 release）
  # ==========================================================================
  build-macos:
    name: Build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node App
        uses: ./.github/actions/setup-node-app

      - name: Build Python backend (web_api.app via Nuitka)
        uses: ./.github/actions/build-python-mac

      - name: Verify web_api.app exists
        shell: bash
        run: |
          if [ ! -f "python/out/web_api.app/Contents/MacOS/web_api" ]; then
            echo "Error: web_api.app not found, Nuitka build failed"
            exit 1
          fi
          SIZE_MB=$(du -sm "python/out/web_api.app" | cut -f1)
          echo "web_api.app size: ${SIZE_MB} MB"

      # make 同时产出 packaged app 和 ZIP 安装包
      # --platform=darwin 让 forge 只运行 MakerZIP，跳过 Squirrel/WiX/RPM/Deb
      - name: Build installers with Electron Forge (macOS)
        shell: bash
        env:
          NODE_OPTIONS: "--unhandled-rejections=warn"
        run: npm run make -- --platform=darwin

      # 验证打包产物存在
      - name: Verify packaged app exists
        shell: bash
        run: |
          echo "Contents of out/:"
          ls -d out/*/ 2>/dev/null || true
          BUILD_DIR=$(find out -maxdepth 1 -type d -name "*darwin*" | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "Error: Packaged app not found in out/ (expected *darwin-arm64*)"
            exit 1
          fi
          echo "Packaged app: $BUILD_DIR"

      # 上传打包产物供 e2e-macos job 下载使用
      - name: Upload packaged app (for E2E)
        uses: actions/upload-artifact@v4
        with:
          name: packaged-app-mac
          path: out/Electron Media Toolbox-darwin-arm64/
          if-no-files-found: error
          retention-days: 1

      # 上传 ZIP 安装包供 release job 下载使用
      - name: Upload release assets (for release)
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-mac
          path: out/make/
          if-no-files-found: error
          retention-days: 7

  # ==========================================================================
  # Job 3a: E2E 集成测试 (Windows, Playwright + Electron)
  # 等待 quality + build-windows 都通过后执行
  # ==========================================================================
  e2e-windows:
    name: E2E (Windows)
    needs: [quality, build-windows]
    if: success()
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node App
        uses: ./.github/actions/setup-node-app
        with:
          rebuild-native: "false"

      # --ignore-scripts 跳过了 Electron postinstall，但 Playwright 的
      # _electron.launch() 需要 node_modules/electron/dist/electron.exe 才能启动应用
      - name: Install Electron binary
        shell: bash
        run: node node_modules/electron/install.js

      # 下载 build-windows job 产出的打包应用
      # upload-artifact@v4 上传目录时会剥离外层目录名（artifact 根 = 目录内容），
      # 下载时必须指定含平台目录名的 path，才能还原 out/<platform-dir>/ 结构供 findLatestBuild() 定位
      - name: Download packaged app
        uses: actions/download-artifact@v4
        with:
          name: packaged-app-win
          path: out/Electron Media Toolbox-win32-x64

      # electron.launch() 以开发模式启动（!app.isPackaged），resolvePythonBackendConfig
      # 查找 python/out/web_api.exe。但 E2E job 不编译后端（在 build job 完成），
      # 需从打包产物的 resources/ 中提取 web_api.exe 到 python/out/ 供后端启动
      - name: Extract web_api.exe for E2E backend
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "out" -Recurse -Filter "web_api.exe" -ErrorAction Stop | Select-Object -First 1
          if (-not $exe) { throw "web_api.exe not found in packaged app" }
          New-Item -ItemType Directory -Path "python/out" -Force | Out-Null
          Copy-Item $exe.FullName "python/out/web_api.exe" -Force
          Write-Host "Copied web_api.exe ($([math]::Round($exe.Length/1MB,1))MB) to python/out/"

      - name: Setup Playwright
        shell: pwsh
        run: npx playwright install

      - name: Run E2E tests
        env:
          E2E_TEST_IMAGES_DIR: ${{ github.workspace }}/src/tests/e2e/fixtures/images
          E2E_EXPORT_DIR: ${{ runner.temp }}/e2e-export
        shell: pwsh
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-win-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            playwright-report/
            test-results/

  # ==========================================================================
  # Job 3b: E2E 集成测试 (macOS, Playwright + Electron)
  # 等待 quality + build-macos 都通过后执行
  # ==========================================================================
  e2e-macos:
    name: E2E (macOS)
    needs: [quality, build-macos]
    if: success()
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node App
        uses: ./.github/actions/setup-node-app
        with:
          rebuild-native: "false"

      # Playwright 的 _electron.launch() 需要 node_modules/electron/dist/Electron.app
      - name: Install Electron binary
        shell: bash
        run: node node_modules/electron/install.js

      # 下载 build-macos job 产出的打包应用
      # path 含平台目录名以还原 out/<platform-dir>/ 结构（同 e2e-windows 的处理）
      - name: Download packaged app
        uses: actions/download-artifact@v4
        with:
          name: packaged-app-mac
          path: out/Electron Media Toolbox-darwin-arm64

      # 从打包产物中提取 web_api.app 到 python/out/
      # main.ts dev 模式查找 python/out/web_api.app/Contents/MacOS/web_api
      # web_api.app 是目录（standalone app bundle），必须整体拷贝以保留框架结构
      - name: Extract web_api.app for E2E backend
        shell: bash
        run: |
          SRC=$(find out -type d -name "web_api.app" | head -1)
          if [ -z "$SRC" ]; then echo "Error: web_api.app not found in packaged app"; exit 1; fi
          mkdir -p python/out
          cp -R "$SRC" python/out/
          SIZE_MB=$(du -sm "python/out/web_api.app" | cut -f1)
          echo "Copied web_api.app (${SIZE_MB} MB) to python/out/"

      - name: Setup Playwright
        shell: bash
        run: npx playwright install

      - name: Run E2E tests
        env:
          E2E_TEST_IMAGES_DIR: ${{ github.workspace }}/src/tests/e2e/fixtures/images
          E2E_EXPORT_DIR: ${{ runner.temp }}/e2e-export
        shell: bash
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-mac-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            playwright-report/
            test-results/

  # ==========================================================================
  # Job 4: 发版（收集双平台 assets → GitHub Release）
  # 等待两个 E2E 都通过后执行，仅 push to master 时触发（PR 跳过）
  # 单 job 跑在 ubuntu（最便宜），只需 gh CLI 收集 + 发布，无需编译
  # ==========================================================================
  release:
    name: Release
    needs: [e2e-windows, e2e-macos]
    runs-on: ubuntu-latest
    # 仅 push to master 或手动触发时发版；PR 不发版
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # release notes 需要完整 commit 历史

      # 下载两个平台的 release assets（安装包）
      - name: Download Windows release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-win
          path: release-assets/win

      - name: Download macOS release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-mac
          path: release-assets/mac

      # 将所有平台的安装包汇总到单一目录
      # 用 find 而非 globstar（bash 默认未启用 globstar，** 会静默退化为 *）
      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/all

          # Windows: Squirrel Setup.exe + WiX .msi
          find release-assets/win -name '*.exe' -exec cp -t release-assets/all/ {} + 2>/dev/null || echo "[warn] No Windows .exe found"
          find release-assets/win -name '*.msi' -exec cp -t release-assets/all/ {} + 2>/dev/null || echo "[warn] No Windows .msi found"

          # macOS: ZIP
          find release-assets/mac -name '*.zip' -exec cp -t release-assets/all/ {} + 2>/dev/null || echo "[warn] No macOS .zip found"

          echo "==== Collected assets ===="
          ls -la release-assets/all/

      - name: Generate SHA256 checksums
        shell: bash
        run: |
          cd release-assets/all
          : > checksums.txt
          for f in *; do
            [ "$f" = "checksums.txt" ] && continue
            hash=$(sha256sum "$f" | cut -d' ' -f1)
            echo "$hash  $f" >> checksums.txt
          done
          echo "==== checksums.txt ===="
          cat checksums.txt

      - name: Resolve version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "undefined" ]; then
            echo "Failed to resolve package.json version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      # 从上一个版本 tag 到 HEAD 的 commit 按版本 bump 分节展示
      - name: Generate release notes from commit log
        env:
          VERSION: ${{ steps.v.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          # 查找上一个版本 tag（仅匹配 x.y.z 格式，排除 backup/Alpha 等非版本 tag）
          PREV_TAG=$(git tag --sort=-creatordate \
            | grep -E "^(v)?[0-9]+\.[0-9]+\.[0-9]+$" \
            | grep -vE "^(v)?${VERSION}$" \
            | head -1)

          {
            echo "## 更新内容"
            echo ""

            if [ -z "$PREV_TAG" ]; then
              echo "（首次发布）"
              git log --format="%h %s" --reverse | head -50
            else
              # 查找版本 bump commit：首个在 package.json diff 中引入当前版本号的 commit
              BUMPCOMMIT=$(git log "${PREV_TAG}..HEAD" --reverse --format="%H" \
                -S "\"version\": \"${VERSION}\"" -- package.json | head -1)

              if [ -n "$BUMPCOMMIT" ]; then
                # 有版本 bump：分两节，避免上个版本期间积累的 commit 与本版本新增混在一起
                # 第二节：bump 之后的 commit（当前版本的新增变更）
                POST_BUMP=$(git log "${BUMPCOMMIT}..HEAD" --format="%h %s" --reverse)
                if [ -n "$POST_BUMP" ]; then
                  echo "### v${VERSION} 新增"
                  echo ""
                  echo "$POST_BUMP"
                  echo ""
                fi

                # 第一节：bump commit 及之前积累的 commit（上个版本期间未发版的变更）
                ACCUMULATED=$(git log "${PREV_TAG}..${BUMPCOMMIT}" --format="%h %s" --reverse)
                if [ -n "$ACCUMULATED" ]; then
                  echo "### 自 \`${PREV_TAG}\` 积累"
                  echo ""
                  echo "$ACCUMULATED"
                  echo ""
                fi
              else
                # 无版本 bump（同版本重新 push）：单节展示全部增量
                echo "自 \`${PREV_TAG}\` 以来的变更："
                echo ""
                git log "${PREV_TAG}..HEAD" --format="%h %s" --reverse
                echo ""
              fi
            fi

            echo "---"
            echo "自动构建 from ${{ github.sha }}"
          } > release-notes.md
          echo "==== release-notes.md ===="
          cat release-notes.md

      # 同一版本多次 push：tag 已存在则更新 notes + assets（--clobber 覆盖）
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists; updating notes and assets."
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$TAG" \
              --notes-file release-notes.md
          fi

          cd release-assets/all
          for file in *; do
            echo "Uploading $file"
            gh release upload "$TAG" "$file" --repo "$GITHUB_REPOSITORY" --clobber
          done
