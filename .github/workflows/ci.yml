name: CI

# 质量门禁：lint + typecheck + format + vitest 单元测试
# 跨平台矩阵验证（ubuntu + windows），不跑重型的 Forge make / E2E

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-latest
          - os: windows
            runner: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      # 单元测试基于 jsdom，不触达 better-sqlite3 native 绑定，跳过 rebuild 加速
      - name: Setup Node App
        uses: ./.github/actions/setup-node-app
        with:
          rebuild-native: "false"

      - name: Lint (eslint)
        # 存量违规已全量清理（jsx-runtime 预设 + TS 关闭 prop-types/display-name
        # + CommonJS 配置补 globals + 源码 any/unused 逐项修复），恢复为阻塞门禁
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Format check (prettier)
        run: npm run format

      - name: Unit tests (vitest, jsdom)
        run: npm run test
