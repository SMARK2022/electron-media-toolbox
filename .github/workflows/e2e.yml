name: E2E (Windows)

# Electron + Playwright 集成测试：需先 package 出未签名应用，并启动后端
# 默认手动 + PR 触发，不阻塞 release 流水线；fixture 图缺失时 import 类用例会降级跳过

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
    paths:
      - "src/**"
      - "python/**"
      - "forge.config.ts"
      - "package.json"
      - ".github/workflows/e2e.yml"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        # 不在此处 lfs: true；ONNX 模型由 build-python-win 的 cache 负责还原

      - name: Setup Node App
        uses: ./.github/actions/setup-node-app

      - name: Build Python backend
        uses: ./.github/actions/build-python-win

      # package 产出未签名应用 out/Electron Media Toolbox-win32-x64/
      # E2E 的 findLatestBuild() 会自动定位它
      - name: Package app (no makers)
        shell: pwsh
        run: npm run package

      - name: Setup Playwright
        shell: pwsh
        run: npx playwright install

      # E2E 路径已相对化，通过 env 指向 fixture / 临时导出目录
      - name: Run E2E tests
        env:
          E2E_TEST_IMAGES_DIR: ${{ github.workspace }}/src/tests/e2e/fixtures/images
          E2E_EXPORT_DIR: ${{ runner.temp }}/e2e-export
        shell: pwsh
        run: npm run test:e2e

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            playwright-report/
            test-results/
