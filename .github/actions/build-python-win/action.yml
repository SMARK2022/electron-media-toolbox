name: "Build Python Backend (Windows)"
description: "Cache web_api.exe; on miss, setup Miniconda + Nuitka + compile. Skips ~20min compile when unchanged."

inputs:
  conda-env:
    description: "Conda environment name to activate (must match scripts/python-make.bat expectation)"
    required: false
    default: "nuitka"
  python-version:
    description: "Python version used by the build env"
    required: false
    default: "3.11"

runs:
  using: "composite"
  steps:
    # web_api.exe 缓存：Python 源码/依赖/模型不变时直接复用，跳过 ~20min Nuitka 编译
    - name: Cache web_api.exe
      id: exe-cache
      uses: actions/cache@v4
      with:
        path: python/out/web_api.exe
        key: web-api-exe-${{ runner.os }}-${{ hashFiles('python/requirements.txt', 'python/web_api.py', 'python/utils/**/*.py', 'python/checkpoint/*.onnx') }}

    - name: Skip Nuitka compile (cache hit)
      if: steps.exe-cache.outputs.cache-hit == 'true'
      shell: bash
      run: echo "✓ web_api.exe cache hit, skipping Nuitka compile (~20min saved)"

    # ==================== 以下步骤仅在缓存未命中时执行 ====================
    - name: Setup MSBuild / MSVC toolchain
      if: steps.exe-cache.outputs.cache-hit != 'true'
      uses: microsoft/setup-msbuild@v2

    # ONNX 模型(~105MB)走 Git LFS；用 cache 避免每次 CI checkout 都消耗 LFS 带宽
    - name: Restore ONNX models (cache)
      if: steps.exe-cache.outputs.cache-hit != 'true'
      id: onnx-cache
      uses: actions/cache@v4
      with:
        path: python/checkpoint
        key: onnx-models-${{ hashFiles('python/checkpoint/*.onnx') }}

    - name: Pull ONNX models via LFS (cache miss only)
      if: steps.exe-cache.outputs.cache-hit != 'true' && steps.onnx-cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        git lfs install
        git lfs pull

    - name: Setup Miniconda
      if: steps.exe-cache.outputs.cache-hit != 'true'
      uses: conda-incubator/setup-miniconda@v3
      with:
        activate-environment: ${{ inputs.conda-env }}
        python-version: ${{ inputs.python-version }}
        channels: conda-forge,defaults
        auto-activate-base: false

    # Nuitka onefile 编译耗时较长，缓存 .nuitka-cache 加速增量构建（源码变更时的 fallback）
    - name: Cache Nuitka build artifacts
      if: steps.exe-cache.outputs.cache-hit != 'true'
      uses: actions/cache@v4
      with:
        path: python/.nuitka-cache
        key: ${{ runner.os }}-nuitka-${{ hashFiles('python/requirements.txt', 'python/web_api.py', 'python/utils/**/*.py') }}
        restore-keys: |
          ${{ runner.os }}-nuitka-

    - name: Install Nuitka and Python dependencies
      if: steps.exe-cache.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        set "CONDA_BAT=%CONDA%\condabin\conda.bat"
        call "%CONDA_BAT%" activate nuitka
        python -m ensurepip --upgrade
        python -m pip install --upgrade pip
        pip install nuitka
        pip install -r python/requirements.txt

    # python-make.cjs 会调用 python-make.bat，bat 内部再次 `conda activate nuitka`（幂等）
    # CI 子进程里 conda 可能不在 PATH，通过 CONDA_BAT 显式指向 conda.bat 让 bat 能激活环境
    - name: Compile web_api.exe via Nuitka
      if: steps.exe-cache.outputs.cache-hit != 'true'
      shell: cmd
      run: |
        if defined CONDA set "CONDA_BAT=%CONDA%\condabin\conda.bat"
        node scripts/python-make.cjs

    - name: Verify web_api.exe exists
      shell: pwsh
      run: |
        if (-not (Test-Path "python/out/web_api.exe")) {
          throw "python/out/web_api.exe not found, Nuitka build failed"
        }
        $sizeMB = [math]::Round((Get-Item python/out/web_api.exe).Length / 1MB, 1)
        Write-Host "web_api.exe size: $sizeMB MB"
