name: "Setup Node App"
description: "Setup Node.js + npm ci (cached) + rebuild better-sqlite3 native module for Electron"

inputs:
  rebuild-native:
    description: "Whether to run `npm run rebuild` for better-sqlite3 (skippable for pure lint/unit jobs)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install npm dependencies
      shell: bash
      run: |
        set -euo pipefail
        npm ci --no-audit --no-fund

    - name: Rebuild native modules (better-sqlite3)
      if: inputs.rebuild-native == 'true'
      shell: bash
      run: npm run rebuild
