name: "Setup Node App"
description: "Setup Node.js + npm ci (cached) + rebuild better-sqlite3 native module for Electron"

inputs:
  rebuild-native:
    description: "Whether to run `npm run rebuild` for better-sqlite3 (skippable for pure lint/unit jobs)"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install npm dependencies
      shell: bash
      run: |
        set -euo pipefail
        # --ignore-scripts 跳过 better-sqlite3 的 node-gyp 编译
        # （CI 的 node 运行时无对应 prebuild，回退源码编译又缺 Python 导致 npm ci 失败）
        # 同时跳过 electron 二进制下载，按需在后续步骤补回
        npm ci --ignore-scripts --no-audit --no-fund

    - name: Setup Python (for node-gyp)
      if: inputs.rebuild-native == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Download Electron binary
      if: inputs.rebuild-native == 'true'
      shell: bash
      run: node node_modules/electron/install.js

    - name: Rebuild native modules (better-sqlite3)
      if: inputs.rebuild-native == 'true'
      shell: bash
      run: npm run rebuild
