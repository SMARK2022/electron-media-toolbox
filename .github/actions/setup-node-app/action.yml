name: "Setup Node App"
description: "Setup Node.js + npm ci + optionally rebuild better-sqlite3 for Electron"

inputs:
  rebuild-native:
    description: "Whether to setup Python, run full npm ci (with install scripts) and electron-rebuild. Set false for pure lint/unit jobs."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        # Node 20 已被 GitHub Actions 弃用；Node 24 的 unhandled-rejections 默认为 throw
        # 会导致 Forge package 进程在异步打包未完成时提前退出（out/ 为空）。
        # Node 22 是最后一个默认 warn 的 LTS，兼容 Forge 7 的异步打包行为。
        # @icons-pack/react-simple-icons 的 engines node>=24 仅为 warn 不阻塞安装。
        node-version: "22"
        cache: "npm"

    # node-gyp 需要 Python 编译 better-sqlite3；必须在 npm ci 之前就位
    - name: Setup Python (for node-gyp)
      if: inputs.rebuild-native == 'true'
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install npm dependencies
      shell: bash
      run: |
        set -euo pipefail
        if [ "${{ inputs.rebuild-native }}" = "true" ]; then
          # 完整安装：让 electron 下载、better-sqlite3 编译（VS 2022 + setup-python）、
          # electron-winstaller 等 install 脚本正常执行（需 windows-2022 runner）
          npm ci --no-audit --no-fund
        else
          # CI 质量门禁：跳过 install 脚本（better-sqlite3 编译、electron 下载等），
          # lint/typecheck/vitest 不需要 native 模块与 electron 二进制
          npm ci --ignore-scripts --no-audit --no-fund
        fi

    - name: Rebuild native modules (better-sqlite3 → Electron ABI)
      if: inputs.rebuild-native == 'true'
      shell: bash
      run: npm run rebuild
