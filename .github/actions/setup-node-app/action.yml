name: "Setup Node App"
description: "Setup Node.js + npm ci (--ignore-scripts) + optionally download Electron and rebuild better-sqlite3"

inputs:
  rebuild-native:
    description: "Whether to download Electron binary and run electron-rebuild. Set false for pure lint/unit jobs."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    # --ignore-scripts 跳过 better-sqlite3 的 node-gyp 编译
    # （CI runner 的 VS 2026 (v18) 不被 @electron/node-gyp v10.2 识别，导致 npm ci 失败）
    # electron-rebuild 会下载 Electron 预编译包（无需本地编译），在后续步骤按需补回
    - name: Install npm dependencies
      shell: bash
      run: |
        set -euo pipefail
        npm ci --ignore-scripts --no-audit --no-fund

    - name: Download Electron binary
      if: inputs.rebuild-native == 'true'
      shell: bash
      run: node node_modules/electron/install.js

    - name: Rebuild native modules (better-sqlite3 → Electron ABI)
      if: inputs.rebuild-native == 'true'
      shell: bash
      run: npm run rebuild
